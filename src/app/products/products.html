<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
  <div class="px-6 py-5 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
    <div>
      <h3 class="text-lg font-semibold text-gray-900">Product Inventory</h3>
      <p class="text-sm text-gray-500 mt-1">Manage and view all available products.</p>
    </div>
    <span class="bg-blue-100 text-blue-700 text-xs font-semibold px-3 py-1 rounded-full border border-blue-200">Active Directory</span>
  </div>
  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200 text-sm">
      <thead class="bg-gray-50">
        <tr>
          <th scope="col" class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider text-xs">ID</th>
          <th scope="col" class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider text-xs">Name</th>
          <th scope="col" class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider text-xs">Price</th>
          <th scope="col" class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider text-xs">Selected</th>
          <th scope="col" class="px-6 py-3 text-right font-medium text-gray-500 uppercase tracking-wider text-xs">Actions</th>
        </tr>
      </thead>
      @if (products) {
        <tbody class="bg-white divide-y divide-gray-200">
          @for (p of products; track p) {
            <tr class="hover:bg-gray-50 transition-colors">
              <td class="px-6 py-4 whitespace-nowrap text-gray-500 font-mono text-xs">#{{p.id}}</td>
              <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">{{p.name}}</td>
              <td class="px-6 py-4 whitespace-nowrap text-gray-600 font-medium">${{p.price}}</td>
              <td class="px-6 py-4 whitespace-nowrap">
              <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                    [class]="p.selected ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-gray-100 text-gray-800 border border-gray-200'">
                {{p.selected}}
              </span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <button (click)="handleDelete(p)" class="text-red-600 hover:text-red-900 bg-red-50 hover:bg-red-100 p-2 rounded-lg transition-colors" title="Delete product">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                  </svg>
                </button>
              </td>
            </tr>
          }
        </tbody>
      }
    </table>
  </div>
</div>
